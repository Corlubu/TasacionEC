<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin Conexión - TasaciónEC</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 500px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.125rem;
      line-height: 1.6;
      opacity: 0.9;
      margin-bottom: 2rem;
    }
    .button {
      display: inline-block;
      background: white;
      color: #667eea;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s;
    }
    .button:hover {
      transform: scale(1.05);
    }
    .features {
      margin-top: 3rem;
      text-align: left;
    }
    .feature {
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
    }
    .feature-icon {
      margin-right: 0.75rem;
      font-size: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Sin Conexión a Internet</h1>
    <p>
      No te preocupes, TasaciónEC funciona offline. Puedes seguir capturando propiedades
      y tus datos se sincronizarán automáticamente cuando recuperes la conexión.
    </p>
    <a href="/" class="button">Volver al Inicio</a>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">✅</div>
        <div>Captura de propiedades offline</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📸</div>
        <div>Fotos guardadas localmente</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔄</div>
        <div>Sincronización automática</div>
      </div>
    </div>
  </div>
</body>
</html>
