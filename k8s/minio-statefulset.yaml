apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  labels:
    app: tasacionec
    component: storage
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: tasacionec
      component: storage
  template:
    metadata:
      labels:
        app: tasacionec
        component: storage
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args:
        - server
        - /data
        - --console-address
        - ":9001"
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9001
          name: console
        env:
        - name: MINIO_ROOT_USER
          value: "admin"
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: tasacionec-secrets
              key: minio-password
        volumeMounts:
        - name: minio-storage
          mountPath: /data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
  volumeClaimTemplates:
  - metadata:
      name: minio-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    app: tasacionec
    component: storage
spec:
  ports:
  - port: 9000
    targetPort: 9000
    name: api
  - port: 9001
    targetPort: 9001
    name: console
  clusterIP: None
  selector:
    app: tasacionec
    component: storage
