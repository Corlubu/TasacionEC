apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tasacionec-ingress
  labels:
    app: tasacionec
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - tasacionec.com
    - www.tasacionec.com
    secretName: tasacionec-tls
  rules:
  - host: tasacionec.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tasacionec-app
            port:
              number: 80
  - host: www.tasacionec.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tasacionec-app
            port:
              number: 80
