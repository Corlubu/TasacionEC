apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasacionec-app
  labels:
    app: tasacionec
    component: app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tasacionec
      component: app
  template:
    metadata:
      labels:
        app: tasacionec
        component: app
    spec:
      containers:
      - name: app
        image: tasacionec/app:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: tasacionec-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: tasacionec-secrets
              key: jwt-secret
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: tasacionec-secrets
              key: openai-api-key
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: tasacionec-secrets
              key: admin-password
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
